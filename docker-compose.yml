version: "3.9"

services:

  # ─────────────────────────────────────────
  # 🎬 Movie Recommendation API
  # ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movierecc_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - DATABASE_URL=postgresql://movieuser:moviepass@postgres:5432/moviedb
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./svd:/app/svd:ro
      - ./gnn:/app/gnn:ro
      - ./hybrid:/app/hybrid:ro
      - ./ir:/app/ir:ro
      - ./embeddings:/app/embeddings:ro
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - movierecc_net

  # ─────────────────────────────────────────
  # 🐘 PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: movierecc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: movieuser
      POSTGRES_PASSWORD: moviepass
      POSTGRES_DB: moviedb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - movierecc_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movieuser -d moviedb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # 🔴 Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: movierecc_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - movierecc_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # 📊 Prometheus
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: movierecc_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - movierecc_net

  # ─────────────────────────────────────────
  # 📈 Grafana
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: movierecc_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana_dashboard.json:/var/lib/grafana/dashboards/movierecc.json:ro
    depends_on:
      - prometheus
    networks:
      - movierecc_net

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  movierecc_net:
    driver: bridge